server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_URL}

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: ${HOSTNAME}
          __path__: /var/lib/docker/containers/*/*-json.log

    relabel_configs:
      # Extract container ID from log file path.
      - source_labels: [filename]
        regex: '.*/([a-f0-9]{64})/[a-f0-9]{64}-json\.log'
        target_label: container_id

    pipeline_stages:
      - docker: {}
