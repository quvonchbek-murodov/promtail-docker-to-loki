server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_URL}

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Container name → container label
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container

      # Docker Compose service name → service label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

      # Override service name from a container label: logging_service_name=my-api
      - source_labels: [__meta_docker_container_label_logging_service_name]
        regex: "(.+)"
        target_label: service

      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream

      - target_label: host
        replacement: ${HOSTNAME}

    pipeline_stages:
      - docker: {}